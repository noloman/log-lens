services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loglens
      POSTGRES_USER: loglens
      POSTGRES_PASSWORD: loglens
    ports:
      - "5432:5432"
    volumes:
      - loglens_pg:/var/lib/postgresql/data

volumes:
  loglens_pg:

