services:

  api:
    container_name: loglens_api
    platform: linux/amd64
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8080"
    environment:
      DATABASE_URL: postgresql://loglens:loglens@db:5432/loglens
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    container_name: loglens_worker
    platform: linux/amd64
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    ports:
      - "8001:8081" # Assuming worker might expose a port for metrics or health checks
    environment:
      DATABASE_URL: postgresql://loglens:loglens@db:5432/loglens
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: loglens_db
    restart: always
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loglens
      POSTGRES_USER: loglens
      POSTGRES_PASSWORD: loglens
    ports:
      - "5432:5432"
    volumes:
      - loglens_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loglens -d loglens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: loglens_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  loglens_pg: