spring:
  jpa:
    show-sql: true
  output:
    ansi:
      enabled: ALWAYS
  application:
    name: loglens-api
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-bytes-long!!}
  expiration-ms: 3600000
